<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        font-family: "Google Sans", "Segoe UI", Roboto, sans-serif;
        color: #202124;
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .header h1 {
        font-size: 15px;
        font-weight: 600;
      }

      .status {
        font-size: 13px;
        color: #5f6368;
        margin-bottom: 16px;
        line-height: 1.4;
      }

      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }

      .status-dot.green {
        background: #1e8e3e;
      }

      .status-dot.red {
        background: #d93025;
      }

      .status-dot.yellow {
        background: #f9ab00;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      button.export-btn {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 20px;
        background: #1a73e8;
        color: #fff;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      button.export-btn:hover {
        background: #1765cc;
      }

      button.export-btn:disabled {
        background: #dadce0;
        color: #80868b;
        cursor: not-allowed;
      }

      button.export-md-btn {
        background: #34a853;
      }

      button.export-md-btn:hover {
        background: #2d9249;
      }

      button.diagnose-btn {
        padding: 10px 14px;
        border: 1px solid #dadce0;
        border-radius: 20px;
        background: #fff;
        color: #5f6368;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
      }

      button.diagnose-btn:hover {
        background: #f1f3f4;
      }

      .tip {
        margin-top: 12px;
        font-size: 11px;
        color: #80868b;
        line-height: 1.4;
      }

      .diag-panel {
        display: none;
        margin-top: 12px;
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 11px;
        font-family: "Roboto Mono", monospace;
        color: #3c4043;
        max-height: 250px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .diag-panel.visible {
        display: block;
      }

      .copy-diag {
        margin-top: 6px;
        padding: 4px 10px;
        border: 1px solid #dadce0;
        border-radius: 12px;
        background: #fff;
        font-size: 11px;
        color: #5f6368;
        cursor: pointer;
        display: none;
      }

      .copy-diag.visible {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>NotebookLM PDF Export</h1>
    </div>

    <div id="status" class="status">
      <span class="status-dot yellow"></span>
      Checking...
    </div>

    <div class="btn-row">
      <button id="exportBtn" class="export-btn" disabled>
        Export as PDF
      </button>
      <button id="exportMdBtn" class="export-btn export-md-btn" disabled>
        Export as MD
      </button>
    </div>
    <div class="btn-row">
      <button id="diagnoseBtn" class="diagnose-btn" title="Show what the extension can see on this page">
        Diagnose
      </button>
    </div>

    <p id="tip" class="tip"></p>

    <div id="diagPanel" class="diag-panel"></div>
    <button id="copyDiag" class="copy-diag">Copy diagnostic info</button>

    <script src="popup.js"></script>
  </body>
</html>
